<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff9d00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kinetic Core | v2.0</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glow: #ff9d00;
            --bg: #050505;
            --red: #ff4d4d;
            --green: #4dff88;
            --panel: rgba(255, 157, 0, 0.05);
            --border: rgba(255, 157, 0, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--glow); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; text-transform: uppercase; 
        }

        /* --- LOADING PROTOCOL --- */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; transition: opacity 1s; 
        }
        .pacer-ring { 
            width: 140px; height: 140px; border: 2px solid var(--glow); 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; animation: ring-breathe 4s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255, 157, 0, 0.1);
        }
        .pacer-inner { 
            width: 85%; height: 80%; border: 1px dashed var(--glow); 
            border-radius: 50%; animation: spin 12s linear infinite; 
        }
        @keyframes ring-breathe { 0%, 100% { transform: scale(0.9); opacity: 0.4; } 50% { transform: scale(1); opacity: 1; box-shadow: 0 0 50px var(--glow); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .load-info { margin-top: 40px; text-align: center; width: 80%; }
        #load-msg { font-size: 0.7rem; letter-spacing: 3px; height: 30px; color: #fff; }
        .load-bar { width: 100%; height: 2px; background: rgba(255,157,0,0.1); margin-top: 10px; position: relative; }
        #load-fill { height: 100%; width: 0%; background: var(--glow); box-shadow: 0 0 10px var(--glow); }

        /* --- MAIN HUD --- */
        #hud { 
            display: none; height: 100%; flex-direction: column; 
            padding: env(safe-area-inset-top) 20px 20px; 
            opacity: 0; transition: opacity 1s; 
        }

        .header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }
        .rank-box b { font-size: 0.9rem; color: #fff; display: block; }
        .rank-box span { font-size: 0.6rem; color: var(--green); letter-spacing: 1px; }

        /* HOLOGRAPHIC SILHOUETTE */
        #sil-wrap { width: 50px; height: 70px; border: 1px solid var(--border); padding: 5px; background: var(--panel); }
        .sil-svg { width: 100%; height: 100%; }
        .sil-part { stroke: #333; stroke-width: 2; fill: none; transition: stroke 1s; }
        .active-hardware { stroke: var(--glow); filter: drop-shadow(0 0 3px var(--glow)); }

        /* METERS */
        .meter-section { margin: 20px 0; }
        .meter-label { font-size: 0.6rem; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .meter-bg { width: 100%; height: 4px; background: var(--dark); border-radius: 2px; overflow: hidden; }
        .meter-fill { height: 100%; background: var(--glow); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* WARNINGS */
        .alert-box { 
            border: 1px solid var(--red); background: rgba(255, 77, 77, 0.05); 
            padding: 12px; margin-bottom: 20px; text-align: center;
            clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
        }
        .btn-alert { 
            background: var(--red); color: #000; border: none; 
            padding: 6px 15px; font-family: 'Share Tech Mono'; font-weight: bold; 
            margin-top: 8px; cursor: pointer; font-size: 0.7rem;
        }
        .btn-alert:disabled { background: #222; color: #555; }

        /* MISSION CARDS */
        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 100px; }
        .scroll-area::-webkit-scrollbar { display: none; }
        
        .mission-card { 
            border: 1px solid var(--border); background: var(--panel); 
            padding: 15px; margin-bottom: 15px; position: relative;
        }
        .mission-card.locked { opacity: 0.4; border-color: var(--green); }
        .m-title { font-size: 0.8rem; color: #fff; margin-bottom: 5px; }
        .m-data { font-size: 0.55rem; opacity: 0.6; margin-bottom: 10px; }
        .btn-execute { 
            width: 100%; background: none; border: 1px solid var(--glow); 
            color: var(--glow); padding: 10px; font-family: 'Share Tech Mono'; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s;
        }
        .btn-execute:active { background: var(--glow); color: #000; }

        /* --- TACTICAL OVERLAY --- */
        #tactical-mode { 
            position: fixed; inset: 0; background: #000; z-index: 4000; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 40px; 
        }
        .timer-val { font-size: 6rem; font-weight: bold; text-shadow: 0 0 30px var(--glow); }
        .phase-label { font-size: 0.9rem; letter-spacing: 8px; margin-bottom: 20px; }
        .integrity-err { color: var(--red); font-size: 0.7rem; margin-top: 20px; animation: flash 0.5s infinite; }
        @keyframes flash { 50% { opacity: 0; } }

        /* FOOTER */
        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; 
            background: linear-gradient(0deg, #000 70%, transparent); 
            display: flex; justify-content: space-around; border-top: 1px solid var(--border);
        }
        .stat-block { text-align: center; }
        .stat-block span { display: block; }
        .s-val { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .s-lbl { font-size: 0.5rem; opacity: 0.5; margin-top: 2px; }
    </style>
</head>
<body>

    <!-- INITIALIZATION PROTOCOL -->
    <div id="loader">
        <div class="pacer-ring"><div class="pacer-inner"></div></div>
        <div class="load-info">
            <div id="load-msg">INITIALIZING_VITALITY_CORE...</div>
            <div class="load-bar"><div id="load-fill"></div></div>
        </div>
    </div>

    <!-- TACTICAL EXECUTION OVERLAY -->
    <div id="tactical-mode">
        <div id="phase-txt" class="phase-label">WORK_PHASE</div>
        <div id="set-counter" style="font-size: 0.7rem; margin-bottom: 10px;">SET 01 // 04</div>
        <div class="timer-val" id="timer">00</div>
        <div id="scripture" style="font-size: 0.8rem; line-height: 1.6; color: #fff; max-width: 300px; margin-top: 30px;"></div>
        <div id="p-alert" class="integrity-err" style="display:none;">INTEGRITY_BREACH: +10s PENALTY</div>
    </div>

    <div id="hud">
        <div class="header">
            <div class="rank-box">
                <b id="rank-name">CADET [LVL 0]</b>
                <span id="streak-val">DAILY_STREAK: 0 DAYS</span>
            </div>
            <div id="sil-wrap">
                <svg class="sil-svg" viewBox="0 0 50 80">
                    <path class="sil-part" id="sil-frame" d="M25 15 L15 30 L15 55 L20 75 M25 15 L35 30 L35 55 L30 75" />
                    <circle class="sil-part" id="sil-head" cx="25" cy="10" r="6" />
                    <circle class="sil-part" id="sil-chest" cx="25" cy="28" r="8" />
                </svg>
            </div>
        </div>

        <div class="meter-section">
            <div class="meter-label"><span>XP_PROGRESS</span> <span id="xp-pct">0%</span></div>
            <div class="meter-bg"><div id="xp-fill" class="meter-fill"></div></div>
        </div>

        <div class="scroll-area">
            <!-- SUGAR QUARANTINE -->
            <div class="alert-box" id="sugar-zone">
                <div style="font-size: 0.6rem; color: var(--red);">[!] WARNING: MALWARE_DETECTED (SUGAR)</div>
                <button class="btn-alert" id="sugar-btn" onclick="triggerPenalty()">REPORT_INTAKE</button>
            </div>

            <div id="mission-list"></div>
        </div>

        <div class="footer">
            <div class="stat-block"><span class="s-val" id="stat-kc">0</span><span class="s-lbl">CREDITS</span></div>
            <div class="stat-block"><span class="s-val" id="stat-lvl">0</span><span class="s-lbl">LEVEL</span></div>
        </div>
    </div>

    <script>
        // --- 1. BOOT SEQUENCE ---
        const loadMessages = [
            "CALIBRATING_HARDWARE...",
            "SCANNING_PECTORAL_WALL...",
            "LIFE MIGHT BE STORMY...",
            "IT CAN'T RAIN FOREVER...",
            "SYNCING_MISSION_DIRECTIVES...",
            "REMOVING_LIMITATIONS..."
        ];

        window.onload = () => {
            let p = 0;
            const msgEl = document.getElementById('load-msg');
            const fillEl = document.getElementById('load-fill');
            
            const boot = setInterval(() => {
                p += 1.25;
                fillEl.style.width = p + "%";
                if(Math.floor(p) % 20 === 0) msgEl.innerText = loadMessages[Math.floor(Math.random() * loadMessages.length)];
                
                if(p >= 100) {
                    clearInterval(boot);
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        const hud = document.getElementById('hud');
                        hud.style.display = 'flex';
                        setTimeout(() => { hud.style.opacity = '1'; updateHUD(); }, 50);
                    }, 1000);
                }
            }, 100);
        };

        // --- 2. CORE LOGIC ---
        const missions = [
            { id: 'm1', title: "Pectoral Wall Initiation", sets: 4, reps: 15, work: 35, rest: 30, xp: 50, kc: 100 },
            { id: 'm2', title: "Structural Integrity", sets: 3, reps: 0, work: 30, rest: 20, xp: 30, kc: 80 },
            { id: 'm3', title: "Engine Stamina Burn", sets: 3, reps: 0, work: 60, rest: 30, xp: 60, kc: 150 }
        ];

        const scriptures = [
            "PHILIPPIANS 4:13", "GALATIANS 6:9", "1 CORINTHIANS 9:27", "ISAIAH 40:31", "1 TIMOTHY 4:8"
        ];

        let ST = JSON.parse(localStorage.getItem('kinetic_v2')) || { 
            xp: 0, lvl: 0, kc: 0, streak: 0, date: "", done: [], progress: {}, malware: "" 
        };

        function updateHUD() {
            const today = new Date().toDateString();
            if (ST.date !== today) { 
                ST.done = []; ST.progress = {}; 
                if (ST.date !== new Date(Date.now() - 86400000).toDateString()) ST.streak = 0;
                ST.date = today; 
                save(); 
            }

            const ranks = ["CADET", "HUNTER", "GUARDIAN", "VANGUARD", "ARCHITECT", "ASCENDED"];
            document.getElementById('rank-name').innerText = `${ranks[Math.min(ST.lvl, 5)]} [LVL ${ST.lvl}]`;
            document.getElementById('stat-kc').innerText = ST.kc;
            document.getElementById('stat-lvl').innerText = ST.lvl;
            document.getElementById('streak-val').innerText = `DAILY_STREAK: ${ST.streak} DAYS`;
            
            const xpForNext = 200;
            const pct = (ST.xp % xpForNext) / (xpForNext / 100);
            document.getElementById('xp-fill').style.width = pct + "%";
            document.getElementById('xp-pct').innerText = Math.floor(pct) + "%";

            // Silhouette progression
            if(ST.lvl >= 5) document.getElementById('sil-chest').classList.add('glow-active');
            if(ST.lvl >= 10) {
                document.getElementById('sil-head').classList.add('glow-active');
                document.getElementById('sil-frame').classList.add('glow-active');
            }

            // Sugar Quarantine Status
            if (ST.malware === today) {
                document.getElementById('sugar-btn').disabled = true;
                document.getElementById('sugar-btn').innerText = "SYSTEM_COMPROMISED";
            }

            renderMissions();
        }

        function renderMissions() {
            const container = document.getElementById('mission-list');
            container.innerHTML = missions.map(m => {
                const isDone = ST.done.includes(m.id);
                const currentSet = ST.progress[m.id] || 0;
                return `
                    <div class="mission-card ${isDone ? 'locked' : ''}">
                        <div class="m-title">${isDone ? '[OBJECTIVE_SECURED]' : '>> ' + m.title}</div>
                        <div class="m-data">SETS: ${currentSet}/${m.sets} ${m.reps ? `// ${m.reps} REPS` : ''}</div>
                        <button class="btn-execute" ${isDone ? 'disabled' : ''} onclick="launchMission('${m.id}')">
                            ${isDone ? 'PROTOCOL_COMPLETE' : currentSet > 0 ? '[ CONTINUE_SETS ]' : '[ INITIALIZE_PHASE ]'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        let activeM = null;
        let timer = 0;
        let isRunning = false;
        let isResting = false;

        function launchMission(id) {
            activeM = missions.find(m => m.id === id);
            isResting = false;
            startPhase();
        }

        function startPhase() {
            const currentSet = (ST.progress[activeM.id] || 0) + 1;
            const phaseTxt = document.getElementById('phase-txt');
            phaseTxt.innerText = isResting ? "REST_CALIBRATION" : "WORK_PHASE";
            phaseTxt.style.color = isResting ? "var(--green)" : "var(--glow)";
            
            document.getElementById('set-counter').innerText = `SET ${String(currentSet).padStart(2, '0')} // ${String(activeM.sets).padStart(2, '0')}`;
            timer = isResting ? activeM.rest : activeM.work;
            document.getElementById('timer').innerText = String(timer).padStart(2, '0');
            document.getElementById('scripture').innerText = isResting ? "BREATHING_STABILIZATION..." : scriptures[Math.floor(Math.random() * scriptures.length)];
            
            document.getElementById('tactical-mode').style.display = 'flex';
            isRunning = true;
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && isRunning) {
                timer += 10;
                document.getElementById('p-alert').style.display = 'block';
                setTimeout(() => { document.getElementById('p-alert').style.display = 'none'; }, 3000);
            }
        });

        setInterval(() => {
            if (isRunning && timer > 0) {
                timer--;
                document.getElementById('timer').innerText = String(timer).padStart(2, '0');
                if (timer <= 0) handlePhaseEnd();
            }
        }, 1000);

        function handlePhaseEnd() {
            isRunning = false;
            if (!isResting) {
                if (!ST.progress[activeM.id]) ST.progress[activeM.id] = 0;
                ST.progress[activeM.id]++;
                if (ST.progress[activeM.id] >= activeM.sets) {
                    completeMission();
                } else {
                    isResting = true;
                    startPhase();
                }
            } else {
                isResting = false;
                startPhase();
            }
            save();
        }

        function completeMission() {
            ST.xp += activeM.xp;
            ST.kc += activeM.kc;
            ST.done.push(activeM.id);
            if (ST.done.length === 1) ST.streak++;
            ST.lvl = Math.floor(ST.xp / 200);
            document.getElementById('tactical-mode').style.display = 'none';
            updateHUD();
            save();
        }

        function triggerPenalty() {
            if(confirm("MALWARE_INTAKE_CONFIRMED? -50 KINETIC_CREDITS.")) {
                ST.kc = Math.max(0, ST.kc - 50);
                ST.malware = new Date().toDateString();
                save();
                updateHUD();
            }
        }

        function save() { localStorage.setItem('kinetic_v2', JSON.stringify(ST)); }
    </script>
</body>
</html>
